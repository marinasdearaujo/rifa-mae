<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{font-family:monospace;font-size:28px;padding:30px;background:#111;color:#0f0;line-height:1.6}</style></head>
<body><div id="out">iniciando...</div>
<script>
const API='https://api.restful-api.dev/objects/ff8081819d82fab6019eef917e7e48d3';
const out=document.getElementById('out'); const log=m=>out.innerHTML+='<br>'+m;
(async()=>{
  try{
    log('1) GET...');
    let r=await fetch(API,{headers:{'Accept':'application/json'},cache:'no-store'});
    log('   GET status '+r.status);
    let d=await r.json(); log('   taken atual: '+JSON.stringify(d.data.taken));
    log('2) PUT (reservando 99)...');
    let p=await fetch(API,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'rifa-mae',data:{taken:{"99":{nome:"TESTE BROWSER",status:"reservado"}}}})});
    log('   PUT status '+p.status+' ok='+p.ok);
    log('3) GET confirma...');
    let r2=await fetch(API,{headers:{'Accept':'application/json'},cache:'no-store'});
    let d2=await r2.json(); log('   agora: '+JSON.stringify(d2.data.taken));
    log(p.ok?'<br>✅✅ GRAVACAO NO NAVEGADOR FUNCIONA':'<br>❌ FALHOU');
  }catch(e){ log('<br>❌ ERRO: '+e.message); }
})();
</script></body></html>
